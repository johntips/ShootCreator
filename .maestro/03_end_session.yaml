appId: com.shootcreator.app.qa
---
# Test: End Session & View Summary
# Record shots, end session, verify summary screen

- launchApp

# Start basketball session
- tapOn:
    id: "sport-card-basketball"

# Record some shots
- tapOn:
    id: "btn-made"
- tapOn:
    id: "btn-made"
- tapOn:
    id: "btn-miss"

# End session - tap the header END button
- tapOn:
    id: "btn-end-session"

# Wait for iOS Alert dialog to appear and verify it
- assertVisible: "Save and end this shooting session?"

# Tap "End Session" button in Alert dialog
# Use "below" selector to target the button BELOW the alert message, not the alert title
- tapOn:
    text: "End Session"
    below: "Save and end this shooting session?"
    retryTapIfNoChange: true

# Wait for navigation to summary
- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 5000

- takeScreenshot: summary_screen

# Verify summary elements
- assertVisible:
    id: "summary-title"

- assertVisible:
    id: "summary-fg-count"

- assertVisible:
    id: "summary-fg-pct"

- takeScreenshot: summary_complete
