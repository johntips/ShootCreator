appId: com.shootcreator.app.qa
---
# Test: Start Basketball Session, Record Shots & End Session
# Full session lifecycle: start → record → end → summary

- launchApp

# Tap basketball card to start session
- tapOn:
    id: "sport-card-basketball"

- takeScreenshot: session_screen

# Record a MADE shot
- tapOn:
    id: "btn-made"

- takeScreenshot: after_made

# Record a MISS shot
- tapOn:
    id: "btn-miss"

- takeScreenshot: after_miss

# Verify stats are visible
- assertVisible:
    id: "total-stats"

- takeScreenshot: session_with_shots

# End session - tap the header END button
- tapOn:
    id: "btn-end-session"

# Wait for iOS Alert dialog to appear and verify it
- assertVisible: "Save and end this shooting session?"

# Tap "End Session" button in Alert dialog
# Use "below" selector to target the button BELOW the alert message, not the alert title
- tapOn:
    text: "End Session"
    below: "Save and end this shooting session?"
    retryTapIfNoChange: true

# Wait for navigation to summary
- extendedWaitUntil:
    visible:
      id: "summary-title"
    timeout: 5000

- takeScreenshot: session_complete
