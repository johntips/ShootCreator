name: EAS Build

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS Build profile"
        required: true
        default: "qa"
        type: choice
        options:
          - qa
          - production

concurrency:
  group: eas-build-${{ github.ref }}-${{ inputs.profile || 'auto' }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: EAS Build
    needs: test
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Determine build profile
        id: profile
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ inputs.profile }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "profile=production" >> "$GITHUB_OUTPUT"
          else
            echo "profile=qa" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iOS
        working-directory: apps/mobile
        run: |
          if [ "${{ steps.profile.outputs.profile }}" = "production" ]; then
            eas build --platform ios --profile production --auto-submit --non-interactive
          else
            eas build --platform ios --profile ${{ steps.profile.outputs.profile }} --non-interactive
          fi
