name: EAS Build

on:
  push:
    branches:
      - main
      - develop

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm typecheck
      - run: pnpm test

  build:
    name: EAS Build (${{ github.ref_name == 'main' && 'production' || 'qa' }})
    needs: test
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # QA build (develop branch)
      - name: Build QA (iOS)
        if: github.ref == 'refs/heads/develop'
        working-directory: apps/mobile
        run: eas build --platform ios --profile qa --non-interactive

      # Production build (main branch)
      - name: Build Production (iOS)
        if: github.ref == 'refs/heads/main'
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --non-interactive
